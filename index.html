<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number to Braille Converter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        text-align: center;
        padding: 40px;
    }

    h1 {
        margin-bottom: 20px;
    }

    textarea {
        width: 80%;
        height: 120px;
        font-size: 16px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #007BFF;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    #output {
        margin-top: 25px;
        padding: 15px;
        background: white;
        border-radius: 10px;
        min-height: 50px;
        font-size: 22px;
        word-wrap: break-word;

        white-space: pre-line;          /* SHOW line breaks */
        font-family: Arial, sans-serif; /* FORCE normal font */
    }

    .small {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
    }
</style>
</head>

<body>

<h1>Number → Braille Converter</h1>

<textarea id="inputNumbers" placeholder="Paste numbers here (Excel column or spaced numbers)"></textarea>
<br>

<button onclick="convert()">Convert</button>
<button onclick="copyResult()">Copy Result</button>

<div id="output"></div>

<div class="small">
Outputs # + a–j mapping (ready for Excel paste)
</div>

<script>
function convert() {
    const input = document.getElementById("inputNumbers").value;

    const map = {
        "1": "a","2": "b","3": "c","4": "d","5": "e",
        "6": "f","7": "g","8": "h","9": "i","0": "j"
    };

    let resultLines = [];

    // Split by lines (Excel paste)
    const lines = input.split(/\n/);

    lines.forEach(line => {
        // Also split numbers inside a line (if user pasted "17 22 33")
        let parts = line.trim().split(/\s+/);

        parts.forEach(clean => {
            if (clean !== "") {
                let braille = "#";

                for (let digit of clean) {
                    if (map[digit]) {
                        braille += map[digit];
                    }
                }

                resultLines.push(braille);
            }
        });

        // Keep empty rows aligned
        if (line.trim() === "") {
            resultLines.push("");
        }
    });

    document.getElementById("output").innerText = resultLines.join("\n");
}

function copyResult() {
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied! Paste into Excel column.");
}
</script>

</body>
</html>
