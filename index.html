<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number to Braille Converter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        text-align: center;
        padding: 40px;
    }

    h1 {
        margin-bottom: 20px;
    }

    textarea {
        width: 80%;
        height: 120px;
        font-size: 16px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #007BFF;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    #output {
        margin-top: 25px;
        padding: 15px;
        background: white;
        border-radius: 10px;
        min-height: 50px;
        font-size: 22px;
        word-wrap: break-word;
    }

    .small {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
    }
</style>
</head>

<body>

<h1>Number → Braille Converter</h1>

<textarea id="inputNumbers" placeholder="Enter numbers (e.g. 123 456 or 789, 101)"></textarea>
<br>

<input type="file" id="fileInput">

<br>

<button onclick="convert()">Convert</button>
<button onclick="copyResult()">Copy Result</button>

<div id="output"></div>

<div class="small">
Uses ⠼ + a–j mapping (1–0)
</div>

<script>
function convert() {
    const input = document.getElementById("inputNumbers").value;

    const map = {
        "1": "a",
        "2": "b",
        "3": "c",
        "4": "d",
        "5": "e",
        "6": "f",
        "7": "g",
        "8": "h",
        "9": "i",
        "0": "j"
    };

    let resultLines = [];

    // Split by line (important for Excel)
    const lines = input.split(/\n/);

    lines.forEach(line => {
        let clean = line.trim();

        if (clean !== "") {
            let braille = "#"; // use # instead of ⠼

            for (let digit of clean) {
                if (map[digit]) {
                    braille += map[digit];
                }
            }

            resultLines.push(braille);
        } else {
            resultLines.push(""); // keep empty rows aligned
        }
    });

    document.getElementById("output").innerText = resultLines.join("\n");
}

function copyResult() {
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied! You can now paste into Excel.");
}
</script>

</body>
</html>
